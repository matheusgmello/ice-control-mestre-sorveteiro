kind = "web"
previewPath = "/"
title = "IceControl v2.0"
version = "1.0.0"
id = "artifacts/icecontrol"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18279
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/icecontrol run dev"

[services.env]
PORT = "18279"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/icecontrol", "run", "build"]
publicDir = "artifacts/icecontrol/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
